<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Workout</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --card-hover: #1a1a1a;
    --accent: #e2ff3f;
    --text: #f0f0f0;
    --text-dim: #888;
    --border: #222;
    --section-bg: #111;
  }
  
  html { scroll-behavior: smooth; }
  
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 0;
  }
  
  .title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    text-align: center;
  }
  
  .days {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .days::-webkit-scrollbar { display: none; }
  
  .day-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .day-btn:not(.active):hover { border-color: #444; color: var(--text); }
  
  .content { padding: 16px; padding-bottom: 80px; }
  
  .day-title {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .day-subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
    font-weight: 500;
  }
  
  .section {
    margin-bottom: 20px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--section-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
    user-select: none;
  }
  .section-header:hover { background: var(--card); }
  .section-name {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .section-time {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
  }
  .section-chevron {
    font-size: 14px;
    color: var(--text-dim);
    transition: transform 0.3s;
  }
  .section.open .section-chevron { transform: rotate(180deg); }
  
  .section-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .section.open .section-body { max-height: 5000px; }
  
  .exercise {
    display: flex;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid #1a1a1a;
    align-items: flex-start;
  }
  .exercise:last-child { border-bottom: none; }
  
  .exercise-gif {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    background: var(--card);
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    border: 1px solid var(--border);
  }
  .exercise-gif img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .exercise-gif .placeholder {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    padding: 4px;
    line-height: 1.3;
  }
  
  .exercise-info { flex: 1; min-width: 0; }
  .exercise-name {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .exercise-detail {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .exercise-detail .tag {
    display: inline-block;
    background: rgba(226,255,63,0.1);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 4px;
  }
  
  .note {
    padding: 10px 14px;
    background: rgba(226,255,63,0.05);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
  }

  .station-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 16px;
    margin-bottom: 8px;
    padding-left: 2px;
  }
  
  /* GIF Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-content {
    max-width: 400px;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: var(--card);
  }
  .modal-content img {
    width: 100%;
    display: block;
  }
  .modal-title {
    padding: 14px 16px;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
  }
  
  .stretch-section {
    margin-top: 8px;
  }
  .stretch-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #1a1a1a;
    align-items: center;
  }
  .stretch-item:last-child { border-bottom: none; }
  .stretch-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .stretch-text {
    font-size: 14px;
    color: var(--text-dim);
  }
  .stretch-text strong { color: var(--text); font-weight: 500; }
</style>
</head>

const dayOrder = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

let activeDay = dayOrder[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];

function renderTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = dayOrder.map((d, i) => 
    `<button class="day-btn ${d === activeDay ? 'active' : ''}" onclick="selectDay('${d}')">${dayLabels[i]}</button>`
  ).join('');
}

function selectDay(day) {
  activeDay = day;
  renderTabs();
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderContent() {
  const day = DAYS[activeDay];
  const content = document.getElementById('content');
  
  let html = `<div class="day-title">${day.title}</div>`;
  html += `<div class="day-subtitle">${day.subtitle}</div>`;
  
  day.sections.forEach((section, si) => {
    html += `<div class="section open" id="section-${si}">`;
    html += `<div class="section-header" onclick="toggleSection(${si})">`;
    html += `<div><div class="section-name">${section.name}</div></div>`;
    html += `<div style="display:flex;align-items:center;gap:10px;">`;
    html += `<span class="section-time">${section.time}</span>`;
    html += `<span class="section-chevron">▾</span>`;
    html += `</div></div>`;
    
    html += `<div class="section-body">`;
    
    if (section.isStretch) {
      html += `<div class="stretch-section">`;
      section.stretches.forEach(s => {
        html += `<div class="stretch-item">`;
        html += `<div class="stretch-dot"></div>`;
        html += `<div class="stretch-text">${s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>`;
        html += `</div>`;
      });
      html += `</div>`;
    } else {
      if (section.note) {
        html += `<div class="note">${section.note}</div>`;
      }
      section.exercises.forEach(ex => {
        html += `<div class="exercise">`;
        html += `<div class="exercise-gif" ${ex.gif ? `onclick="openModal('${ex.gif}','${ex.name.replace(/'/g, "\\'")}')"` : ''}>`;
        if (ex.gif) {
          html += `<img src="${ex.gif}" alt="${ex.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=placeholder>${ex.name}</div>'">`;
        } else {
          html += `<div class="placeholder">${ex.name}</div>`;
        }
        html += `</div>`;
        html += `<div class="exercise-info">`;
        html += `<div class="exercise-name">${ex.name}</div>`;
        html += `<div class="exercise-detail">${ex.detail}`;
        if (ex.tags && ex.tags.length) {
          ex.tags.forEach(t => { html += ` <span class="tag">${t}</span>`; });
        }
        html += `</div></div></div>`;
      });
    }
    
    html += `</div></div>`;
  });
  
  content.innerHTML = html;
}

function toggleSection(index) {
  document.getElementById(`section-${index}`).classList.toggle('open');
}

function openModal(src, name) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderTabs();
renderContent();
</script>
