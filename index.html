<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Burn From Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e17;--card:#141c2b;--card-border:#1e2d40;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.12);
  --text:#e8edf4;--mid:#7a8a9e;--dim:#3d4d60;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{scroll-behavior:smooth;overscroll-behavior-y:contain}
body{
  font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
  max-width:430px;margin:0 auto;overflow-x:hidden;
  padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,14,23,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(30,45,64,0.6);
  padding:calc(var(--safe-top) + 12px) 16px 0;
}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:15px;font-weight:800;letter-spacing:-0.3px}
.logo span{color:var(--accent)}
.start-btn{
  padding:7px 16px;border-radius:10px;border:none;
  background:var(--accent);color:#fff;font-family:inherit;
  font-size:12px;font-weight:700;cursor:pointer;
  transition:all 0.2s;letter-spacing:0.3px;
}
.start-btn:active{transform:scale(0.95);opacity:0.9}
.start-btn.active-workout{background:var(--red);animation:pulse-btn 2s infinite}
@keyframes pulse-btn{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}

.days{display:flex;gap:4px;padding-bottom:12px;overflow-x:auto;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day-btn{
  flex-shrink:0;padding:8px 14px;border:none;border-radius:10px;
  background:transparent;color:var(--mid);font-family:inherit;
  font-size:13px;font-weight:600;cursor:pointer;transition:all 0.25s;
  position:relative;
}
.day-btn.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.day-btn .count{
  display:block;font-size:9px;color:var(--dim);font-weight:500;margin-top:1px;
}
.day-btn.active .count{color:var(--mid)}

/* PROGRESS BAR */
.progress-wrap{height:3px;background:rgba(255,255,255,0.04);position:sticky;top:0;z-index:101}
.progress-bar{height:100%;background:var(--accent);border-radius:0 2px 2px 0;transition:width 0.4s ease;width:0}

/* CONTENT AREA */
.content-wrap{position:relative;overflow:hidden}
.content{padding:0 16px 120px;transition:transform 0.3s ease,opacity 0.3s ease}
.content.slide-left{transform:translateX(-30px);opacity:0}
.content.slide-right{transform:translateX(30px);opacity:0}

/* DAY INFO */
.day-info{padding:20px 0 16px}
.day-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.day-meta{font-size:12px;color:var(--mid);margin-top:4px;font-weight:500}

/* PHASE */
.phase-bar{display:flex;align-items:center;gap:8px;padding:18px 0 8px}
.phase-dot{width:8px;height:8px;border-radius:50%}
.phase-dot.warmup{background:var(--amber)}
.phase-dot.workout{background:var(--accent)}
.phase-dot.stretch{background:var(--green)}
.phase-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mid)}
.phase-note{font-size:11px;color:var(--dim);font-style:italic;padding:0 0 6px 16px}

/* EXERCISE CARD */
.ex-card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:14px;padding:12px;margin-bottom:8px;
  display:flex;gap:12px;align-items:center;
  cursor:pointer;transition:all 0.2s;
  position:relative;overflow:hidden;
}
.ex-card:active{transform:scale(0.985);background:#182438}
.ex-card.done{opacity:0.45}
.ex-card.done::after{
  content:'✓';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:18px;color:var(--green);font-weight:700;
}

.ex-thumb{
  width:64px;height:64px;border-radius:10px;background:#0d1320;
  flex-shrink:0;overflow:hidden;border:1px solid var(--card-border);
  position:relative;
}
.ex-thumb img{width:100%;height:100%;object-fit:cover;transition:opacity 0.3s}
.ex-thumb img.loading{opacity:0}
.ex-thumb .skeleton{
  position:absolute;inset:0;background:linear-gradient(110deg,#0d1320 30%,#182438 50%,#0d1320 70%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.ex-thumb .ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--dim);text-align:center;padding:4px;line-height:1.2;
}

.ex-body{flex:1;min-width:0;padding-right:8px}
.ex-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:2px}
.ex-sub{font-size:11px;color:var(--mid);margin-bottom:6px}

.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  padding:3px 10px;border-radius:7px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  font-size:11px;font-weight:600;color:var(--mid);
}
.pill-accent{color:var(--accent);border-color:rgba(59,130,246,0.15);background:rgba(59,130,246,0.06)}

.ex-tag{
  display:inline-block;margin-left:5px;
  padding:2px 6px;border-radius:4px;font-size:8px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.3px;vertical-align:middle;
}
.tag-back-to-back{background:rgba(59,130,246,0.12);color:var(--accent)}
.tag-optional{background:rgba(255,255,255,0.04);color:var(--dim)}

/* BOTTOM SHEET MODAL */
.sheet-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0);
  z-index:999;transition:background 0.3s;
}
.sheet-overlay.show{display:block;background:rgba(0,0,0,0.6)}
.sheet{
  position:fixed;bottom:0;left:50%;width:100%;max-width:430px;
  transform:translate(-50%,100%);
  background:var(--card);border-radius:20px 20px 0 0;
  z-index:1000;transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  padding-bottom:var(--safe-bottom);
  max-height:85vh;overflow-y:auto;
}
.sheet.show{transform:translate(-50%,0)}
.sheet-handle{
  width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;
  margin:10px auto 0;
}
.sheet-gif{
  width:100%;aspect-ratio:1;background:#0d1320;display:flex;
  align-items:center;justify-content:center;overflow:hidden;
}
.sheet-gif img{width:100%;height:100%;object-fit:contain}
.sheet-info{padding:20px 20px 24px}
.sheet-info h3{font-size:20px;font-weight:800;letter-spacing:-0.3px}
.sheet-info .sheet-detail{font-size:13px;color:var(--mid);margin-top:4px}
.sheet-actions{display:flex;gap:10px;margin-top:16px}
.sheet-btn{
  flex:1;padding:14px;border-radius:12px;border:none;
  font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
  transition:all 0.2s;
}
.sheet-btn:active{transform:scale(0.96)}
.sheet-btn-done{background:var(--green);color:#fff}
.sheet-btn-done.is-done{background:rgba(255,255,255,0.08);color:var(--mid)}
.sheet-btn-close{background:rgba(255,255,255,0.06);color:var(--text)}

/* GUIDED WORKOUT MODE */
.guided-overlay{
  display:none;position:fixed;inset:0;z-index:2000;
  background:var(--bg);flex-direction:column;
}
.guided-overlay.show{display:flex}
.guided-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-top) + 12px) 16px 12px;
}
.guided-progress{height:3px;background:rgba(255,255,255,0.06);margin:0 16px}
.guided-progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s ease}
.guided-close{
  padding:8px 16px;border-radius:10px;border:none;
  background:rgba(255,255,255,0.08);color:var(--text);
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
}
.guided-close:active{opacity:0.7}
.guided-phase{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mid)}
.guided-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;position:relative}
.guided-card{
  width:100%;max-width:380px;text-align:center;
  transition:transform 0.35s ease,opacity 0.35s ease;
}
.guided-card.exit-left{transform:translateX(-100%);opacity:0}
.guided-card.exit-right{transform:translateX(100%);opacity:0}
.guided-card.enter-left{transform:translateX(-60px);opacity:0}
.guided-card.enter-right{transform:translateX(60px);opacity:0}
.guided-gif{
  width:240px;height:240px;border-radius:20px;background:#0d1320;
  margin:0 auto 24px;overflow:hidden;border:1px solid var(--card-border);
}
.guided-gif img{width:100%;height:100%;object-fit:cover}
.guided-gif .ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--dim);padding:16px;
}
.guided-name{font-size:22px;font-weight:800;letter-spacing:-0.3px;margin-bottom:6px}
.guided-sub{font-size:13px;color:var(--mid);margin-bottom:16px}
.guided-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.guided-pills .pill{font-size:13px;padding:6px 16px;border-radius:10px}

.guided-bottom{padding:16px 20px calc(var(--safe-bottom) + 16px);display:flex;gap:10px}
.guided-nav{
  flex:1;padding:16px;border-radius:14px;border:none;
  font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
  transition:all 0.15s;
}
.guided-nav:active{transform:scale(0.96)}
.guided-nav.prev{background:rgba(255,255,255,0.06);color:var(--text)}
.guided-nav.next{background:var(--accent);color:#fff}
.guided-nav:disabled{opacity:0.3;pointer-events:none}

/* REST TIMER */
.timer-overlay{
  display:none;position:fixed;inset:0;z-index:3000;
  background:rgba(10,14,23,0.96);
  flex-direction:column;align-items:center;justify-content:center;
}
.timer-overlay.show{display:flex}
.timer-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--mid);margin-bottom:16px}
.timer-display{font-size:80px;font-weight:900;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.timer-ring{
  width:220px;height:220px;position:relative;margin-bottom:24px;
  display:flex;align-items:center;justify-content:center;
}
.timer-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:4}
.timer-ring .track{stroke:rgba(255,255,255,0.06)}
.timer-ring .fill{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.timer-presets{display:flex;gap:10px;margin-top:20px}
.timer-preset{
  padding:10px 20px;border-radius:10px;border:1px solid var(--card-border);
  background:transparent;color:var(--text);font-family:inherit;
  font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;
}
.timer-preset:active,.timer-preset.active{background:var(--accent);border-color:var(--accent);color:#fff}
.timer-skip{
  margin-top:24px;padding:12px 32px;border-radius:12px;border:none;
  background:rgba(255,255,255,0.06);color:var(--mid);
  font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
}
.timer-skip:active{opacity:0.7}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="top-row">
    <div class="logo">BURN<span>FROM</span>HOME</div>
    <button class="start-btn" id="startBtn" onclick="toggleGuided()">▶ START</button>
  </div>
  <div class="days" id="tabs"></div>
</div>

<!-- SCROLL PROGRESS -->
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

<!-- CONTENT -->
<div class="content-wrap">
  <div class="content" id="content"></div>
</div>

<!-- BOTTOM SHEET -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-gif"><img id="sheetImg" src="" alt=""></div>
  <div class="sheet-info">
    <h3 id="sheetTitle"></h3>
    <div class="sheet-detail" id="sheetDetail"></div>
    <div class="sheet-actions">
      <button class="sheet-btn sheet-btn-done" id="sheetDoneBtn" onclick="toggleDoneFromSheet()">✓ Done</button>
      <button class="sheet-btn sheet-btn-close" onclick="closeSheet()">Close</button>
    </div>
  </div>
</div>

<!-- GUIDED WORKOUT MODE -->
<div class="guided-overlay" id="guided">
  <div class="guided-top">
    <div class="guided-phase" id="guidedPhase"></div>
    <button class="guided-close" onclick="exitGuided()">✕ Exit</button>
  </div>
  <div class="guided-progress"><div class="guided-progress-bar" id="guidedProgress"></div></div>
  <div class="guided-body">
    <div class="guided-card" id="guidedCard">
      <div class="guided-gif" id="guidedGif"></div>
      <div class="guided-name" id="guidedName"></div>
      <div class="guided-sub" id="guidedSub"></div>
      <div class="guided-pills" id="guidedPills"></div>
    </div>
  </div>
  <div class="guided-bottom">
    <button class="guided-nav prev" id="guidedPrev" onclick="guidedNav(-1)">← Back</button>
    <button class="guided-nav next" id="guidedNext" onclick="guidedNav(1)">Next →</button>
  </div>
</div>

<!-- REST TIMER -->
<div class="timer-overlay" id="timer">
  <div class="timer-label">Rest Timer</div>
  <div class="timer-ring">
    <svg viewBox="0 0 220 220"><circle class="track" cx="110" cy="110" r="100"/><circle class="fill" id="timerFill" cx="110" cy="110" r="100"/></svg>
    <div class="timer-display" id="timerDisplay">0:45</div>
  </div>
  <div class="timer-presets">
    <button class="timer-preset" onclick="setTimer(30)">0:30</button>
    <button class="timer-preset active" onclick="setTimer(45)">0:45</button>
    <button class="timer-preset" onclick="setTimer(60)">1:00</button>
    <button class="timer-preset" onclick="setTimer(90)">1:30</button>
  </div>
  <button class="timer-skip" onclick="closeTimer()">Skip Rest</button>
</div>

const DAYS={

    title:'Monday', sub:'Team Challenge', duration:'30 min',
    phases:[

const dayOrder=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const dayLabels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let active=dayOrder[new Date().getDay()===0?6:new Date().getDay()-1];

// COMPLETION STATE (localStorage, resets daily)
const today=new Date().toISOString().slice(0,10);
let doneKey='bfh-done-'+today;
let doneSet=new Set(JSON.parse(localStorage.getItem(doneKey)||'[]'));
// Clean old days
Object.keys(localStorage).forEach(k=>{if(k.startsWith('bfh-done-')&&k!==doneKey)localStorage.removeItem(k)});

function saveDone(){localStorage.setItem(doneKey,JSON.stringify([...doneSet]))}
function exId(day,pi,ei){return day+'-'+pi+'-'+ei}

// SWIPE DETECTION
let touchStartX=0,touchStartY=0,swiping=false;
document.addEventListener('touchstart',ev=>{
  if(document.getElementById('guided').classList.contains('show'))return;
  if(document.getElementById('sheet').classList.contains('show'))return;
  touchStartX=ev.touches[0].clientX;touchStartY=ev.touches[0].clientY;swiping=true;
},{passive:true});
document.addEventListener('touchend',ev=>{
  if(!swiping)return;swiping=false;
  const dx=ev.changedTouches[0].clientX-touchStartX;
  const dy=ev.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    const idx=dayOrder.indexOf(active);
    if(dx<0&&idx<6)switchDay(dayOrder[idx+1],'left');
    else if(dx>0&&idx>0)switchDay(dayOrder[idx-1],'right');
  }
},{passive:true});

function switchDay(d,dir){
  const el=document.getElementById('content');
  el.classList.add('slide-'+(dir==='left'?'left':'right'));
  setTimeout(()=>{
    active=d;renderTabs();render();
    el.classList.remove('slide-left','slide-right');
    el.classList.add(dir==='left'?'slide-right':'slide-left');
    void el.offsetWidth;
    el.classList.remove('slide-left','slide-right');
    window.scrollTo({top:0});
  },150);
  try{navigator.vibrate&&navigator.vibrate(10)}catch(e){}
}

function sel(d){
  if(d===active)return;
  const idx=dayOrder.indexOf(d),cur=dayOrder.indexOf(active);
  switchDay(d,idx>cur?'left':'right');
}

// SCROLL PROGRESS
window.addEventListener('scroll',()=>{
  const h=document.documentElement.scrollHeight-window.innerHeight;
  const pct=h>0?Math.min(100,window.scrollY/h*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
},{passive:true});

// COUNT
function countExercises(day){let c=0;day.phases.forEach(p=>{if(p.items)c+=p.items.length});return c}
function countDone(dayKey){
  const day=DAYS[dayKey];let c=0,t=0;
  day.phases.forEach((p,pi)=>{if(p.items)p.items.forEach((_,ei)=>{t++;if(doneSet.has(exId(dayKey,pi,ei)))c++})});
  return{c,t};
}

// RENDER TABS
function renderTabs(){
  document.getElementById('tabs').innerHTML=dayOrder.map((d,i)=>{
    const{c,t}=countDone(d);
    const dot=c===t&&t>0?' ✓':'';
    return `<button class="day-btn ${d===active?'active':''}" onclick="sel('${d}')">
      ${dayLabels[i]}${dot}<span class="count">${countExercises(DAYS[d])}</span>
    </button>`;
  }).join('');
}

// RENDER CONTENT
function render(){
  const day=DAYS[active];
  const{c,t}=countDone(active);
  let h=`<div class="day-info">
    <div class="day-title">${day.sub}</div>
    <div class="day-meta">${day.title} · ${t} exercises · ${day.duration}${c>0?' · '+c+'/'+t+' done':''}</div>
  </div>`;

  day.phases.forEach((p,pi)=>{
    h+=`<div class="phase-bar"><div class="phase-dot ${p.type}"></div><div class="phase-name">${p.label}</div></div>`;
    if(p.note)h+=`<div class="phase-note">${p.note}</div>`;
    if(p.items)p.items.forEach((ex,ei)=>{
      const id=exId(active,pi,ei);
      const done=doneSet.has(id);
      h+=`<div class="ex-card${done?' done':''}" onclick="openSheet('${active}',${pi},${ei})" data-id="${id}">`;
      h+=`<div class="ex-thumb">`;
      if(ex.g)h+=`<div class="skeleton"></div><img src="${ex.g}" alt="${ex.n}" loading="lazy" class="loading" onload="this.classList.remove('loading');this.previousElementSibling.style.display='none'" onerror="this.outerHTML='<div class=ph>${ex.n}</div>';this.previousElementSibling.style.display='none'">`;
      else h+=`<div class="ph">${ex.n}</div>`;
      h+=`</div><div class="ex-body">`;
      h+=`<div class="ex-name">${ex.n}`;
      if(ex.tag)h+=`<span class="ex-tag tag-${ex.tag}">${ex.tag.replace(/-/g,' ')}</span>`;
      h+=`</div>`;
      if(ex.sub)h+=`<div class="ex-sub">${ex.sub}</div>`;
      h+=`<div class="pills">`;
      if(ex.s)h+=`<div class="pill">${ex.s}</div>`;
      if(ex.r)h+=`<div class="pill pill-accent">${ex.r}</div>`;
      h+=`</div></div></div>`;
    });
  });
  document.getElementById('content').innerHTML=h;
  updateStartBtn();
}

// BOTTOM SHEET
let sheetCtx=null;
function openSheet(day,pi,ei){
  const ex=DAYS[day].phases[pi].items[ei];
  sheetCtx={day,pi,ei,ex};
  const id=exId(day,pi,ei);
  document.getElementById('sheetImg').src=ex.g||'';
  document.getElementById('sheetImg').style.display=ex.g?'block':'none';
  document.getElementById('sheetTitle').textContent=ex.n;
  document.getElementById('sheetDetail').textContent=[ex.sub,ex.s,ex.r].filter(Boolean).join(' · ');
  const btn=document.getElementById('sheetDoneBtn');
  const done=doneSet.has(id);
  btn.textContent=done?'Undo':'✓ Done';
  btn.className='sheet-btn sheet-btn-done'+(done?' is-done':'');
  document.getElementById('sheetOverlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
  document.body.style.overflow='hidden';
  try{navigator.vibrate&&navigator.vibrate(5)}catch(e){}
}
function closeSheet(){
  document.getElementById('sheetOverlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
  document.body.style.overflow='';
  sheetCtx=null;
}
function toggleDoneFromSheet(){
  if(!sheetCtx)return;
  const id=exId(sheetCtx.day,sheetCtx.pi,sheetCtx.ei);
  if(doneSet.has(id))doneSet.delete(id);else doneSet.add(id);
  saveDone();
  closeSheet();
  renderTabs();render();
  try{navigator.vibrate&&navigator.vibrate([10,30,10])}catch(e){}
}

// Sheet swipe-down to close
let sheetTouchY=0;
document.getElementById('sheet').addEventListener('touchstart',ev=>{sheetTouchY=ev.touches[0].clientY},{passive:true});
document.getElementById('sheet').addEventListener('touchend',ev=>{
  if(ev.changedTouches[0].clientY-sheetTouchY>80)closeSheet();
},{passive:true});

// GUIDED WORKOUT MODE
let guidedItems=[];
let guidedIdx=0;
let guidedActive=false;

function flattenDay(dayKey){
  const items=[];
  DAYS[dayKey].phases.forEach((p,pi)=>{
    if(p.items)p.items.forEach((ex,ei)=>{
      items.push({...ex,phase:p.label,phaseType:p.type,pi,ei,id:exId(dayKey,pi,ei)});
    });
  });
  return items;
}

function toggleGuided(){
  if(guidedActive){exitGuided();return}
  guidedItems=flattenDay(active);
  guidedIdx=0;
  // Start from first undone
  for(let i=0;i<guidedItems.length;i++){if(!doneSet.has(guidedItems[i].id)){guidedIdx=i;break}}
  guidedActive=true;
  document.getElementById('guided').classList.add('show');
  document.getElementById('startBtn').classList.add('active-workout');
  document.getElementById('startBtn').textContent='■ STOP';
  renderGuided();
  try{navigator.vibrate&&navigator.vibrate(15)}catch(e){}
}
function exitGuided(){
  guidedActive=false;
  document.getElementById('guided').classList.remove('show');
  document.getElementById('startBtn').classList.remove('active-workout');
  document.getElementById('startBtn').textContent='▶ START';
  renderTabs();render();
}
function renderGuided(){
  const item=guidedItems[guidedIdx];
  if(!item)return;
  document.getElementById('guidedPhase').textContent=item.phase;
  document.getElementById('guidedProgress').style.width=((guidedIdx+1)/guidedItems.length*100)+'%';
  const gifEl=document.getElementById('guidedGif');
  if(item.g)gifEl.innerHTML=`<img src="${item.g}" alt="${item.n}">`;
  else gifEl.innerHTML=`<div class="ph">${item.n}</div>`;
  document.getElementById('guidedName').textContent=item.n;
  document.getElementById('guidedSub').textContent=item.sub||'';
  let pills='';
  if(item.s)pills+=`<div class="pill">${item.s}</div>`;
  if(item.r)pills+=`<div class="pill pill-accent">${item.r}</div>`;
  document.getElementById('guidedPills').innerHTML=pills;
  document.getElementById('guidedPrev').disabled=guidedIdx===0;
  const isLast=guidedIdx===guidedItems.length-1;
  const nextBtn=document.getElementById('guidedNext');
  nextBtn.textContent=isLast?'Finish ✓':'Next →';
  if(isLast)nextBtn.style.background='var(--green)';
  else nextBtn.style.background='var(--accent)';
}

function guidedNav(dir){
  const card=document.getElementById('guidedCard');
  // Mark current as done when going next
  if(dir===1){
    doneSet.add(guidedItems[guidedIdx].id);
    saveDone();
  }
  if(dir===1&&guidedIdx===guidedItems.length-1){
    exitGuided();
    try{navigator.vibrate&&navigator.vibrate([20,40,20,40,20])}catch(e){}
    return;
  }
  // Animate
  card.classList.add(dir===1?'exit-left':'exit-right');
  setTimeout(()=>{
    guidedIdx+=dir;
    renderGuided();
    card.classList.remove('exit-left','exit-right');
    card.classList.add(dir===1?'enter-right':'enter-left');
    void card.offsetWidth;
    card.classList.remove('enter-right','enter-left');
  },180);
  // Show rest timer between workout sets (not warmup/stretch)
  const cur=guidedItems[guidedIdx];
  const nxt=guidedItems[guidedIdx+dir];
  if(dir===1&&cur&&cur.phaseType==='workout'&&nxt&&nxt.phaseType==='workout'&&cur.s){
    setTimeout(()=>showTimer(),250);
  }
  try{navigator.vibrate&&navigator.vibrate(10)}catch(e){}
}

// Guided swipe
let guidedTouchX=0;
document.getElementById('guided').addEventListener('touchstart',ev=>{guidedTouchX=ev.touches[0].clientX},{passive:true});
document.getElementById('guided').addEventListener('touchend',ev=>{
  const dx=ev.changedTouches[0].clientX-guidedTouchX;
  if(Math.abs(dx)>60){
    if(dx<0&&guidedIdx<guidedItems.length-1)guidedNav(1);
    else if(dx>0&&guidedIdx>0)guidedNav(-1);
  }
},{passive:true});

// REST TIMER
let timerInterval=null;
let timerSecs=45;
let timerTotal=45;
const circ=2*Math.PI*100;

function showTimer(){
  timerSecs=45;timerTotal=45;
  updateTimerDisplay();
  document.getElementById('timerFill').style.strokeDasharray=circ;
  document.getElementById('timerFill').style.strokeDashoffset='0';
  document.getElementById('timer').classList.add('show');
  // Highlight active preset
  document.querySelectorAll('.timer-preset').forEach(b=>{
    b.classList.toggle('active',b.textContent.trim()==='0:45');
  });
  startTimerCountdown();
}
function setTimer(s){
  clearInterval(timerInterval);
  timerSecs=s;timerTotal=s;
  updateTimerDisplay();
  document.getElementById('timerFill').style.strokeDashoffset='0';
  document.querySelectorAll('.timer-preset').forEach(b=>{
    const label=Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;
    b.classList.toggle('active',b.textContent.trim()===label);
  });
  startTimerCountdown();
}
function startTimerCountdown(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerSecs--;
    if(timerSecs<=0){
      clearInterval(timerInterval);
      timerSecs=0;
      try{navigator.vibrate&&navigator.vibrate([100,50,100,50,200])}catch(e){}
      setTimeout(closeTimer,800);
    }
    updateTimerDisplay();
    const pct=(timerTotal-timerSecs)/timerTotal;
    document.getElementById('timerFill').style.strokeDashoffset=circ*pct;
  },1000);
}
function updateTimerDisplay(){
  const m=Math.floor(timerSecs/60);
  const s=timerSecs%60;
  document.getElementById('timerDisplay').textContent=m+':'+(s<10?'0':'')+s;
}
function closeTimer(){
  clearInterval(timerInterval);
  document.getElementById('timer').classList.remove('show');
}

function updateStartBtn(){
  const btn=document.getElementById('startBtn');
  if(!guidedActive){
    btn.classList.remove('active-workout');
    btn.textContent='▶ START';
  }
}

// ESC key
document.addEventListener('keydown',ev=>{
  if(ev.key==='Escape'){
    if(document.getElementById('timer').classList.contains('show'))closeTimer();
    else if(guidedActive)exitGuided();
    else if(document.getElementById('sheet').classList.contains('show'))closeSheet();
  }
});

renderTabs();render();
