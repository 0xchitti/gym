<!DOCTYPE html>

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Burn From Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --surface-2:#1a1a1a;
  --border:rgba(255,255,255,0.06);
  --border-light:rgba(255,255,255,0.1);
  --accent:#c8ff00;
  --accent-dim:rgba(200,255,0,0.1);
  --text:#f0f0f0;
  --text-2:#999;
  --text-3:#555;
  --warmup:#ff9f43;
  --workout:#c8ff00;
  --stretch:#38d9a9;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{scroll-behavior:smooth;overscroll-behavior-y:contain}
body{
  font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  min-height:100dvh;-webkit-font-smoothing:antialiased;
  max-width:430px;margin:0 auto;overflow-x:hidden;
  padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,0.85);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 14px) 20px 0;
}
.top-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#0a0a0a;font-family:'Space Grotesk',sans-serif;
}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;letter-spacing:-0.5px}
.logo-text span{color:var(--accent)}

.days{display:flex;gap:6px;padding-bottom:14px;overflow-x:auto;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day-btn{
  flex-shrink:0;padding:10px 0;width:46px;border:none;border-radius:12px;
  background:transparent;color:var(--text-3);font-family:'Space Grotesk',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all 0.25s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.day-btn.active{background:var(--surface-2);color:var(--text)}
.day-btn .day-dot{width:4px;height:4px;border-radius:50%;background:transparent;transition:all 0.25s}
.day-btn.active .day-dot{background:var(--accent)}

/* CONTENT */
.content-wrap{position:relative;overflow:hidden}
.content{padding:0 20px 100px;transition:transform 0.3s ease,opacity 0.3s ease}
.content.slide-left{transform:translateX(-40px);opacity:0}
.content.slide-right{transform:translateX(40px);opacity:0}

/* DAY HEADER */
.day-header{padding:28px 0 20px}
.day-label{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:8px;
}
.day-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1.1}
.day-meta{font-size:12px;color:var(--text-3);margin-top:8px;display:flex;gap:12px;align-items:center}
.day-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--text-3)}

/* PHASE */
.phase-section{margin-top:28px}
.phase-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.phase-line{height:1px;flex:1;background:var(--border)}
.phase-tag{
  padding:5px 12px;border-radius:100px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;
  font-family:'Space Grotesk',sans-serif;
}
.phase-tag.warmup{background:rgba(255,159,67,0.12);color:var(--warmup);border:1px solid rgba(255,159,67,0.2)}
.phase-tag.workout{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(200,255,0,0.2)}
.phase-tag.stretch{background:rgba(56,217,169,0.1);color:var(--stretch);border:1px solid rgba(56,217,169,0.2)}
.phase-note{font-size:12px;color:var(--text-3);margin:4px 0 12px;font-style:italic}

/* EXERCISE CARD */
.ex-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:14px;margin-bottom:8px;
  display:flex;gap:14px;align-items:center;
  cursor:pointer;transition:all 0.2s ease;
}
.ex-card:active{transform:scale(0.98);background:var(--surface-2)}

.ex-thumb{
  width:60px;height:60px;border-radius:12px;background:var(--surface-2);
  flex-shrink:0;overflow:hidden;position:relative;
}
.ex-thumb img,.ex-thumb video{width:100%;height:100%;object-fit:cover;transition:opacity 0.3s}
.ex-thumb img.loading,.ex-thumb video.loading{opacity:0}
.ex-thumb .skeleton{
  position:absolute;inset:0;
  background:linear-gradient(110deg,var(--surface-2) 30%,#222 50%,var(--surface-2) 70%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.ex-thumb .ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--text-3);text-align:center;padding:4px;line-height:1.2;
}

.ex-body{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:3px;letter-spacing:-0.2px}
.ex-sub{font-size:11px;color:var(--text-3);margin-bottom:8px}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  padding:4px 10px;border-radius:8px;background:var(--surface-2);
  font-size:11px;font-weight:600;color:var(--text-2);
}
.pill-accent{color:var(--accent);background:var(--accent-dim)}

.ex-tag{
  display:inline-block;margin-left:6px;
  padding:2px 7px;border-radius:6px;font-size:8px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.5px;vertical-align:middle;
}
.tag-back-to-back{background:var(--accent-dim);color:var(--accent)}
.tag-optional{background:rgba(255,255,255,0.04);color:var(--text-3)}

/* BOTTOM SHEET */
.sheet-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0);
  z-index:999;transition:background 0.3s;
}
.sheet-overlay.show{display:block;background:rgba(0,0,0,0.65)}
.sheet{
  position:fixed;bottom:0;left:50%;width:100%;max-width:430px;
  transform:translate(-50%,100%);
  background:var(--surface);border-radius:24px 24px 0 0;
  border-top:1px solid var(--border-light);
  z-index:1000;transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);
  padding-bottom:calc(var(--safe-bottom) + 20px);max-height:85vh;overflow-y:auto;
}
.sheet.show{transform:translate(-50%,0)}
.sheet-handle{width:40px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:12px auto 0}
.sheet-gif{
  width:100%;aspect-ratio:1;background:var(--bg);display:flex;
  align-items:center;justify-content:center;overflow:hidden;
}
.sheet-gif img,.sheet-gif video{width:100%;height:100%;object-fit:contain}
.sheet-info{padding:24px 24px 8px}
.sheet-info h3{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.5px}
.sheet-info .sheet-detail{font-size:13px;color:var(--text-2);margin-top:6px}
.sheet-close{
  display:block;width:calc(100% - 48px);margin:20px 24px 0;
  padding:16px;border-radius:14px;border:none;
  background:var(--surface-2);color:var(--text);
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all 0.2s;letter-spacing:-0.2px;
}
.sheet-close:active{transform:scale(0.96);opacity:0.8}
</style>
</head>

const dayOrder=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const dayLabels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let active=dayOrder[new Date().getDay()===0?6:new Date().getDay()-1];

// SWIPE
let touchStartX=0,touchStartY=0,swiping=false;
document.addEventListener('touchstart',ev=>{
  if(document.getElementById('sheet').classList.contains('show'))return;
  touchStartX=ev.touches[0].clientX;touchStartY=ev.touches[0].clientY;swiping=true;
},{passive:true});
document.addEventListener('touchend',ev=>{
  if(!swiping)return;swiping=false;
  const dx=ev.changedTouches[0].clientX-touchStartX;
  const dy=ev.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    const idx=dayOrder.indexOf(active);
    if(dx<0&&idx<6)switchDay(dayOrder[idx+1],'left');
    else if(dx>0&&idx>0)switchDay(dayOrder[idx-1],'right');
  }
},{passive:true});

function switchDay(d,dir){
  const el=document.getElementById('content');
  el.classList.add('slide-'+(dir==='left'?'left':'right'));
  setTimeout(()=>{
    active=d;renderTabs();render();
    el.classList.remove('slide-left','slide-right');
    el.classList.add(dir==='left'?'slide-right':'slide-left');
    void el.offsetWidth;
    el.classList.remove('slide-left','slide-right');
    window.scrollTo({top:0});
  },150);
  try{navigator.vibrate&&navigator.vibrate(10)}catch(e){}
}
function sel(d){
  if(d===active)return;
  const idx=dayOrder.indexOf(d),cur=dayOrder.indexOf(active);
  switchDay(d,idx>cur?'left':'right');
}

function countExercises(day){let c=0;day.phases.forEach(p=>{if(p.items)c+=p.items.length});return c}

function renderTabs(){
  document.getElementById('tabs').innerHTML=dayOrder.map((d,i)=>
    `<button class="day-btn ${d===active?'active':''}" onclick="sel('${d}')">
      ${dayLabels[i]}<div class="day-dot"></div>
    </button>`
  ).join('');
}

function render(){
  const day=DAYS[active];
  let h=`<div class="day-header">
    <div class="day-label">${day.title}</div>
    <div class="day-title">${day.sub}</div>
    <div class="day-meta">
      <span>${countExercises(day)} exercises</span><div class="dot"></div><span>${day.duration}</span>
    </div>
  </div>`;

  day.phases.forEach(p=>{
    h+=`<div class="phase-section">
      <div class="phase-header">
        <span class="phase-tag ${p.type}">${p.label}</span>
        <div class="phase-line"></div>
      </div>`;
    if(p.note)h+=`<div class="phase-note">${p.note}</div>`;
    if(p.items)p.items.forEach(ex=>{
      h+=`<div class="ex-card" ${ex.g?`onclick="openSheet('${ex.g.replace(/'/g,"\\'")}','${ex.n.replace(/'/g,"\\'")}','${[ex.sub,ex.s,ex.r].filter(Boolean).join(' · ')}')"`:''}>`;
      h+=`<div class="ex-thumb">`;
      if(ex.g)h+=`<div class="skeleton"></div><video src="${ex.g}" autoplay loop muted playsinline preload="metadata" class="loading" onloadeddata="this.classList.remove('loading');this.previousElementSibling.style.display='none'" onerror="this.outerHTML='<div class=ph>${ex.n}</div>';this.previousElementSibling.style.display='none'"></video>`;
      else h+=`<div class="ph">${ex.n}</div>`;
      h+=`</div><div class="ex-body">`;
      h+=`<div class="ex-name">${ex.n}`;
      if(ex.tag)h+=`<span class="ex-tag tag-${ex.tag}">${ex.tag.replace(/-/g,' ')}</span>`;
      h+=`</div>`;
      if(ex.sub)h+=`<div class="ex-sub">${ex.sub}</div>`;
      h+=`<div class="pills">`;
      if(ex.s)h+=`<div class="pill">${ex.s}</div>`;
      if(ex.r)h+=`<div class="pill pill-accent">${ex.r}</div>`;
      h+=`</div></div></div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('content').innerHTML=h;
}

// BOTTOM SHEET
function openSheet(gif,name,detail){
  document.getElementById('sheetVid').src=gif;
  document.getElementById('sheetVid').style.display=gif?'block':'none';
  document.getElementById('sheetTitle').textContent=name;
  document.getElementById('sheetDetail').textContent=detail;
  document.getElementById('sheetOverlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
  document.body.style.overflow='hidden';
  try{navigator.vibrate&&navigator.vibrate(5)}catch(e){}
}
function closeSheet(){
  document.getElementById('sheetOverlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
  document.body.style.overflow='';
}
let sheetTouchY=0;
document.getElementById('sheet').addEventListener('touchstart',ev=>{sheetTouchY=ev.touches[0].clientY},{passive:true});
document.getElementById('sheet').addEventListener('touchend',ev=>{
  if(ev.changedTouches[0].clientY-sheetTouchY>80)closeSheet();
},{passive:true});

document.addEventListener('keydown',ev=>{if(ev.key==='Escape')closeSheet()});

renderTabs();render();
</script>
