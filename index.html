<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1520;--card:#1a2332;--card-border:#243044;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.15);
  --text:#e8edf4;--mid:#8899aa;--dim:#4a5568;
  --pill-bg:#141d2b;--pill-border:#1e2d40;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;max-width:430px;margin:0 auto}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(15,21,32,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--card-border);
  padding:14px 16px 0;
}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.logo{font-size:15px;font-weight:800;letter-spacing:-0.3px}
.logo span{color:var(--accent)}

.days{display:flex;gap:4px;padding-bottom:14px;overflow-x:auto;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day-btn{
  flex-shrink:0;padding:8px 18px;border:none;border-radius:10px;
  background:transparent;color:var(--mid);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;
}
.day-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3)}

/* CONTENT */
.content{padding:0 16px 100px}

/* DAY INFO */
.day-info{padding:20px 0 16px}
.day-title{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.day-meta{font-size:13px;color:var(--mid);margin-top:4px;font-weight:500}

/* PHASE LABEL */
.phase-bar{
  display:flex;align-items:center;gap:8px;
  padding:16px 0 10px;
}
.phase-dot{width:8px;height:8px;border-radius:50%}
.phase-dot.warmup{background:#f59e0b}
.phase-dot.workout{background:var(--accent)}
.phase-dot.stretch{background:#22c55e}
.phase-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mid)}
.phase-note{font-size:11px;color:var(--dim);font-style:italic;padding:0 0 8px 16px}

/* EXERCISE CARD */
.ex-card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:14px;padding:12px;margin-bottom:10px;
  display:flex;gap:12px;align-items:center;
  cursor:pointer;transition:transform 0.15s,background 0.2s;
}
.ex-card:active{transform:scale(0.98);background:#1e2a3a}

.ex-thumb{
  width:72px;height:72px;border-radius:10px;background:var(--pill-bg);
  flex-shrink:0;overflow:hidden;border:1px solid var(--card-border);
}
.ex-thumb img{width:100%;height:100%;object-fit:cover}
.ex-thumb .ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--dim);text-align:center;padding:6px;line-height:1.3;
}

.ex-body{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:2px}
.ex-sub{font-size:12px;color:var(--mid);margin-bottom:8px}

.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{
  padding:4px 12px;border-radius:8px;
  background:var(--pill-bg);border:1px solid var(--pill-border);
  font-size:12px;font-weight:600;color:var(--mid);
}
.pill-accent{color:var(--accent);border-color:rgba(59,130,246,0.2);background:rgba(59,130,246,0.08)}

.ex-tag{
  display:inline-block;margin-left:6px;
  padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.3px;vertical-align:middle;
}
.tag-back-to-back{background:rgba(59,130,246,0.15);color:var(--accent)}
.tag-optional{background:rgba(255,255,255,0.05);color:var(--dim)}

/* MODAL */
.modal{
  display:none;position:fixed;inset:0;background:rgba(10,15,25,0.95);
  z-index:1000;align-items:center;justify-content:center;padding:24px;
}
.modal.show{display:flex}
.modal-inner{
  max-width:360px;width:100%;border-radius:18px;overflow:hidden;
  background:var(--card);border:1px solid var(--card-border);animation:pop 0.2s ease;
}
@keyframes pop{from{transform:scale(0.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-inner img{width:100%;display:block}
.modal-info{padding:16px}
.modal-info h3{font-size:17px;font-weight:700}
.modal-info p{font-size:13px;color:var(--mid);margin-top:3px}
.modal-close{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  padding:12px 32px;border-radius:12px;background:var(--accent);
  border:none;color:#fff;font-family:inherit;font-size:14px;font-weight:700;
  cursor:pointer;z-index:1001;display:none;
}
.modal.show~.modal-close{display:block}
</style>
</head>

const dayOrder=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const dayLabels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let active=dayOrder[new Date().getDay()===0?6:new Date().getDay()-1];

function renderTabs(){
  document.getElementById('tabs').innerHTML=dayOrder.map((d,i)=>
    `<button class="day-btn ${d===active?'active':''}" onclick="sel('${d}')">${dayLabels[i]}</button>`
  ).join('');
}

function sel(d){active=d;renderTabs();render();window.scrollTo({top:0,behavior:'smooth'})}

function countExercises(day){
  let count=0;
  day.phases.forEach(p=>{if(p.items)count+=p.items.length});
  return count;
}

function render(){
  const day=DAYS[active];
  const exCount=countExercises(day);
  let h=`<div class="day-info">
    <div class="day-title">${day.sub}</div>
    <div class="day-meta">${day.title} · ${exCount} exercises · ${day.duration}</div>
  </div>`;

  day.phases.forEach(p=>{
    h+=`<div class="phase-bar"><div class="phase-dot ${p.type}"></div><div class="phase-name">${p.label}</div></div>`;
    if(p.note) h+=`<div class="phase-note">${p.note}</div>`;

    if(p.items) p.items.forEach(ex=>{
      h+=`<div class="ex-card" ${ex.g?`onclick="modal('${ex.g.replace(/'/g,"\\'")}','${ex.n.replace(/'/g,"\\'")}','${(ex.s?ex.s+' · ':'')+(ex.r||'')}')"`:''}>`;
      h+=`<div class="ex-thumb">`;
      if(ex.g) h+=`<img src="${ex.g}" alt="${ex.n}" loading="lazy" onerror="this.outerHTML='<div class=ph>${ex.n}</div>'">`;
      else h+=`<div class="ph">${ex.n}</div>`;
      h+=`</div><div class="ex-body">`;
      h+=`<div class="ex-name">${ex.n}`;
      if(ex.tag) h+=`<span class="ex-tag tag-${ex.tag}">${ex.tag}</span>`;
      h+=`</div>`;
      if(ex.sub) h+=`<div class="ex-sub">${ex.sub}</div>`;
      h+=`<div class="pills">`;
      if(ex.s) h+=`<div class="pill">${ex.s}</div>`;
      if(ex.r) h+=`<div class="pill pill-accent">${ex.r}</div>`;
      h+=`</div></div></div>`;
    });
  });

  document.getElementById('content').innerHTML=h;
}

function modal(s,n,d){
  if(!s)return;
  document.getElementById('mI').src=s;
  document.getElementById('mT').textContent=n;
  document.getElementById('mD').textContent=d;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow='';
}
document.addEventListener('keydown',ev=>{if(ev.key==='Escape')closeModal()});

renderTabs();render();
</script>
</body>
</html>
