<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0a;
  --card: #141414;
  --card-border: #1e1e1e;
  --accent: #c8ff00;
  --text: #f5f5f5;
  --text-mid: #a0a0a0;
  --text-dim: #555;
  --warmup: #ff6b35;
  --strength: #4ecdc4;
  --cardio: #ff3366;
  --core: #a855f7;
  --stretch: #22c55e;
  --done: rgba(255,255,255,0.04);
  --radius: 14px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  padding: 14px 16px 0;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 12px;
}
.brand h1 {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.brand h1 span { color: var(--accent); }
.brand .day-label {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 600;
}

.days {
  display: flex;
  gap: 6px;
  padding-bottom: 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.days::-webkit-scrollbar { display: none; }

.day-btn {
  flex-shrink: 0;
  padding: 7px 16px;
  border: 1.5px solid var(--card-border);
  border-radius: 100px;
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.day-btn.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

/* CONTENT */
.content {
  padding: 0 16px 120px;
}

/* DAY INTRO */
.day-intro {
  padding: 24px 0 20px;
}
.day-intro h2 {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.8px;
  line-height: 1.1;
}
.day-intro .meta {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}
.day-intro .meta-item {
  font-size: 12px;
  color: var(--text-mid);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* FLOW TIMELINE */
.flow {
  position: relative;
}

/* Section block */
.block {
  position: relative;
  margin-bottom: 8px;
}

.block-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 0;
  cursor: pointer;
  user-select: none;
}

.block-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
}
.block-dot::after {
  content: '';
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: calc(100% + 40px);
  background: var(--card-border);
}
.block:last-child .block-dot::after { display: none; }

.dot-warmup { background: var(--warmup); box-shadow: 0 0 8px rgba(255,107,53,0.4); }
.dot-strength { background: var(--strength); box-shadow: 0 0 8px rgba(78,205,196,0.4); }
.dot-cardio { background: var(--cardio); box-shadow: 0 0 8px rgba(255,51,102,0.4); }
.dot-core { background: var(--core); box-shadow: 0 0 8px rgba(168,85,247,0.4); }
.dot-stretch { background: var(--stretch); box-shadow: 0 0 8px rgba(34,197,94,0.4); }

.block-info { flex: 1; min-width: 0; }
.block-name {
  font-size: 15px;
  font-weight: 700;
}
.block-time {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
  margin-top: 1px;
}

.block-chevron {
  color: var(--text-dim);
  font-size: 12px;
  transition: transform 0.3s;
  flex-shrink: 0;
}
.block.open .block-chevron { transform: rotate(180deg); }

/* Block body */
.block-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  padding-left: 22px;
}
.block.open .block-body {
  max-height: 3000px;
}

.block-note {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
  padding: 0 0 10px 0;
}

/* Exercise row */
.exercise {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  align-items: center;
}
.exercise:last-child { border-bottom: none; }

.ex-gif {
  width: 64px;
  height: 64px;
  border-radius: 12px;
  background: var(--card);
  flex-shrink: 0;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--card-border);
}
.ex-gif img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.ex-gif .ph {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: var(--text-dim);
  text-align: center;
  padding: 4px;
  line-height: 1.2;
}

.ex-info { flex: 1; min-width: 0; }
.ex-name {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.3;
}
.ex-detail {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 1px;
}

.ex-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-top: 3px;
}
.badge-superset { background: rgba(200,255,0,0.15); color: var(--accent); }
.badge-optional { background: rgba(255,255,255,0.06); color: var(--text-dim); }
.badge-cardio { background: rgba(255,51,102,0.15); color: var(--cardio); }
.badge-maxeffort { background: rgba(255,51,102,0.15); color: var(--cardio); }
.badge-recovery { background: rgba(34,197,94,0.12); color: var(--stretch); }

/* Stretch items */
.stretch-list { padding: 4px 0 8px; }
.stretch-item {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 7px 0;
}
.stretch-bullet {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--stretch);
  flex-shrink: 0;
  margin-top: 5px;
}
.stretch-name {
  font-size: 13px;
  font-weight: 500;
}
.stretch-dur {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: auto;
  flex-shrink: 0;
  font-weight: 500;
}

/* Progress indicator */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: var(--accent);
  z-index: 200;
  transition: width 0.1s;
}

/* MODAL */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.93);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 24px;
  backdrop-filter: blur(8px);
}
.modal-bg.show { display: flex; }

.modal-card {
  max-width: 360px;
  width: 100%;
  border-radius: 20px;
  overflow: hidden;
  background: var(--card);
  border: 1px solid var(--card-border);
  animation: popIn 0.2s ease;
}
@keyframes popIn {
  from { transform: scale(0.92); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-card img { width: 100%; display: block; }
.modal-card .info { padding: 16px; }
.modal-card .info h3 { font-size: 16px; font-weight: 700; }
.modal-card .info p { font-size: 13px; color: var(--text-dim); margin-top: 3px; }

.modal-x {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  z-index: 1001;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-bg.show + .modal-x,
.modal-bg.show ~ .modal-x { display: flex; }
</style>
</head>

const dayOrder = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let activeDay = dayOrder[new Date().getDay()===0?6:new Date().getDay()-1];

function renderTabs() {
  document.getElementById('dayTabs').innerHTML = dayOrder.map((d,i) =>
    `<button class="day-btn ${d===activeDay?'active':''}" onclick="selectDay('${d}')">${dayLabels[i]}</button>`
  ).join('');
  const day = DAYS[activeDay];
  document.getElementById('dayLabel').textContent = day.duration;
}

function selectDay(d) {
  activeDay = d;
  renderTabs();
  renderContent();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleBlock(i) {
  document.getElementById('b'+i).classList.toggle('open');
}

function renderContent() {
  const day = DAYS[activeDay];
  let h = `<div class="day-intro"><h2>${day.subtitle}</h2>
    <div class="meta">
      <div class="meta-item">⏱ ${day.duration}</div>
      <div class="meta-item">${day.sections.length} blocks</div>
    </div>
  </div><div class="flow">`;

  day.sections.forEach((s,i) => {
    h += `<div class="block open" id="b${i}">`;
    h += `<div class="block-header" onclick="toggleBlock(${i})">`;
    h += `<div class="block-dot dot-${s.type}"></div>`;
    h += `<div class="block-info"><div class="block-name">${s.name}</div><div class="block-time">${s.time}</div></div>`;
    h += `<span class="block-chevron">▾</span>`;
    h += `</div>`;
    h += `<div class="block-body">`;
    
    if (s.note) h += `<div class="block-note">${s.note}</div>`;
    
    if (s.isStretch) {
      h += `<div class="stretch-list">`;
      s.stretches.forEach(st => {
        h += `<div class="stretch-item"><div class="stretch-bullet"></div><span class="stretch-name">${st.name}</span><span class="stretch-dur">${st.dur}</span></div>`;
      });
      h += `</div>`;
    } else {
      s.exercises.forEach(e => {
        h += `<div class="exercise">`;
        h += `<div class="ex-gif" ${e.gif?`onclick="openModal('${e.gif.replace(/'/g,"\\'")}','${e.name.replace(/'/g,"\\'")}','${e.detail.replace(/'/g,"\\'")}')"`:''}>`;
        if (e.gif) h += `<img src="${e.gif}" alt="${e.name}" loading="lazy" onerror="this.outerHTML='<div class=ph>${e.name}</div>'">`;
        else h += `<div class="ph">${e.name}</div>`;
        h += `</div>`;
        h += `<div class="ex-info"><div class="ex-name">${e.name}</div><div class="ex-detail">${e.detail}</div>`;
        if (e.badge) h += `<span class="ex-badge badge-${e.badge}">${e.badge}</span>`;
        h += `</div></div>`;
      });
    }
    h += `</div></div>`;
  });

  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

// Scroll progress
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
});

function openModal(src,name,detail) {
  if(!src) return;
  document.getElementById('mImg').src = src;
  document.getElementById('mTitle').textContent = name;
  document.getElementById('mDetail').textContent = detail;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

renderTabs();
renderContent();
</script>
