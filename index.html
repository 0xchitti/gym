<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Burn From Home</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0a;
  --card: #161616;
  --card-border: #1e1e1e;
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.12);
  --text: #f5f5f5;
  --text-mid: #aaa;
  --text-dim: #666;
  --warmup: #ff6b35;
  --strength: #4ecdc4;
  --cardio: #ff3366;
  --core: #a855f7;
  --stretch: #22c55e;
  --radius: 16px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 16px 16px 0;
}

.brand {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.brand h1 {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.brand h1 span { color: var(--accent); }

.day-meta {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.days {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 14px;
  scrollbar-width: none;
}
.days::-webkit-scrollbar { display: none; }

.day-btn {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 14px;
  border: 1.5px solid transparent;
  border-radius: 14px;
  background: var(--card);
  color: var(--text-dim);
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
  min-width: 52px;
}
.day-btn .day-letter {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.day-btn .day-num {
  font-size: 16px;
  font-weight: 800;
}
.day-btn.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(200,255,0,0.2);
}
.day-btn:not(.active):active { transform: scale(0.95); }

/* CONTENT */
.content { padding: 16px; padding-bottom: 100px; }

.day-header {
  margin-bottom: 20px;
}
.day-header h2 {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1.1;
}
.day-header .subtitle {
  font-size: 14px;
  color: var(--text-mid);
  margin-top: 4px;
  font-weight: 500;
}

/* SECTION PILLS */
.section-pills {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin-bottom: 20px;
  scrollbar-width: none;
}
.section-pills::-webkit-scrollbar { display: none; }

.section-pill {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 100px;
  background: var(--card);
  border: 1px solid var(--card-border);
  color: var(--text-mid);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.section-pill.active {
  color: #000;
  border-color: transparent;
}
.section-pill[data-type="warmup"].active { background: var(--warmup); }
.section-pill[data-type="strength"].active { background: var(--strength); }
.section-pill[data-type="cardio"].active { background: var(--cardio); }
.section-pill[data-type="core"].active { background: var(--core); }
.section-pill[data-type="stretch"].active { background: var(--stretch); }
.section-pill[data-type="default"].active { background: var(--accent); }

/* MASONRY GRID */
.masonry {
  columns: 2;
  column-gap: 12px;
}

@media (min-width: 500px) {
  .masonry { columns: 3; }
}

/* EXERCISE CARD */
.card {
  break-inside: avoid;
  margin-bottom: 12px;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--card);
  border: 1px solid var(--card-border);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}
.card:active { transform: scale(0.97); }

.card-gif {
  width: 100%;
  aspect-ratio: 1;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.card-gif img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.3s;
}
.card-gif .fallback {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  padding: 12px;
  font-weight: 500;
}

.card-body {
  padding: 10px 12px 12px;
}
.card-name {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 3px;
}
.card-detail {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.4;
}

.card-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  backdrop-filter: blur(8px);
}
.badge-warmup { background: rgba(255,107,53,0.85); color: #fff; }
.badge-strength { background: rgba(78,205,196,0.85); color: #000; }
.badge-cardio { background: rgba(255,51,102,0.85); color: #fff; }
.badge-core { background: rgba(168,85,247,0.85); color: #fff; }
.badge-optional { background: rgba(255,255,255,0.15); color: var(--text-mid); }
.badge-superset { background: rgba(200,255,0,0.85); color: #000; }
.badge-maxeffort { background: rgba(255,51,102,0.9); color: #fff; }
.badge-recovery { background: rgba(34,197,94,0.85); color: #000; }

/* SECTION HEADER CARD */
.section-header-card {
  break-inside: avoid;
  column-span: all;
  margin-bottom: 16px;
  padding: 16px;
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
}
.section-header-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.08);
}
.section-header-card h3 {
  font-size: 16px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.section-header-card .section-meta {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
  font-weight: 500;
}
.section-header-card .section-note {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-top: 6px;
  font-style: italic;
}

.sh-warmup { background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,107,53,0.05)); }
.sh-strength { background: linear-gradient(135deg, rgba(78,205,196,0.2), rgba(78,205,196,0.05)); }
.sh-cardio { background: linear-gradient(135deg, rgba(255,51,102,0.2), rgba(255,51,102,0.05)); }
.sh-core { background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(168,85,247,0.05)); }
.sh-stretch { background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(34,197,94,0.05)); }
.sh-default { background: linear-gradient(135deg, rgba(200,255,0,0.15), rgba(200,255,0,0.03)); }

/* STRETCH CARDS */
.stretch-card {
  break-inside: avoid;
  margin-bottom: 12px;
  padding: 12px 14px;
  border-radius: var(--radius);
  background: rgba(34,197,94,0.06);
  border: 1px solid rgba(34,197,94,0.12);
}
.stretch-card .stretch-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--stretch);
  margin-bottom: 2px;
}
.stretch-card .stretch-detail {
  font-size: 11px;
  color: var(--text-dim);
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(8px);
}
.modal-overlay.show { display: flex; }
.modal-content {
  max-width: 380px;
  width: 100%;
  border-radius: 20px;
  overflow: hidden;
  background: var(--card);
  border: 1px solid var(--card-border);
  animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-content img {
  width: 100%;
  display: block;
}
.modal-info {
  padding: 16px;
}
.modal-info h3 {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 4px;
}
.modal-info p {
  font-size: 13px;
  color: var(--text-dim);
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
}

/* ALL SECTIONS VIEW */
.all-sections { display: none; }
.all-sections.active { display: block; }
.filtered-view { display: none; }
.filtered-view.active { display: block; }
</style>
</head>

const dayOrder = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const dayNums = ['01','02','03','04','05','06','07'];
let activeDay = dayOrder[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
let activeFilter = 'all';

function renderTabs() {
  const c = document.getElementById('dayTabs');
  c.innerHTML = dayOrder.map((d, i) =>
    `<button class="day-btn ${d === activeDay ? 'active' : ''}" onclick="selectDay('${d}')">
      <span class="day-letter">${dayLabels[i]}</span>
    </button>`
  ).join('');
  document.getElementById('dayMeta').textContent = DAYS[activeDay].duration;
}

function selectDay(day) {
  activeDay = day;
  activeFilter = 'all';
  renderTabs();
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setFilter(type) {
  activeFilter = type;
  renderContent(true);
}

function renderContent(keepScroll) {
  const day = DAYS[activeDay];
  const content = document.getElementById('content');
  
  // Section filter pills
  const types = [...new Set(day.sections.map(s => s.type))];
  let html = `<div class="day-header"><h2>${day.subtitle}</h2></div>`;
  
  html += `<div class="section-pills">`;
  html += `<button class="section-pill ${activeFilter === 'all' ? 'active' : ''}" data-type="default" onclick="setFilter('all')">All</button>`;
  types.forEach(t => {
    const label = t.charAt(0).toUpperCase() + t.slice(1);
    html += `<button class="section-pill ${activeFilter === t ? 'active' : ''}" data-type="${t}" onclick="setFilter('${t}')">${label}</button>`;
  });
  html += `</div>`;

  const filteredSections = activeFilter === 'all' ? day.sections : day.sections.filter(s => s.type === activeFilter);
  
  filteredSections.forEach(section => {
    // Section header
    html += `<div class="section-header-card sh-${section.type}">`;
    html += `<h3>${section.name}</h3>`;
    html += `<div class="section-meta">${section.time}</div>`;
    if (section.note) html += `<div class="section-note">${section.note}</div>`;
    html += `</div>`;
    
    html += `<div class="masonry">`;
    
    if (section.isStretch) {
      section.stretches.forEach(s => {
        html += `<div class="stretch-card">`;
        html += `<div class="stretch-name">${s.name}</div>`;
        html += `<div class="stretch-detail">${s.detail}</div>`;
        html += `</div>`;
      });
    } else {
      section.exercises.forEach(e => {
        html += `<div class="card" onclick="openModal('${(e.gif||'').replace(/'/g,"\\'")}','${e.name.replace(/'/g,"\\'")}','${e.detail.replace(/'/g,"\\'")}')"}>`;
        if (e.badge) html += `<div class="card-badge badge-${e.badge}">${e.badge}</div>`;
        html += `<div class="card-gif">`;
        if (e.gif) {
          html += `<img src="${e.gif}" alt="${e.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="fallback" style="display:none">${e.name}</div>`;
        } else {
          html += `<div class="fallback">${e.name}</div>`;
        }
        html += `</div>`;
        html += `<div class="card-body"><div class="card-name">${e.name}</div><div class="card-detail">${e.detail}</div></div>`;
        html += `</div>`;
      });
    }
    
    html += `</div>`;
  });
  
  content.innerHTML = html;
}

function openModal(src, name, detail) {
  if (!src) return;
  document.getElementById('modalImg').src = src;
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalDetail').textContent = detail;
  const modal = document.getElementById('modal');
  modal.classList.add('show');
  modal.onclick = closeModal;
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderTabs();
renderContent();
</script>
