<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Burn From Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--card:#141414;--border:#1c1c1c;
  --accent:#c8ff00;--text:#f0f0f0;--dim:#666;--mid:#999;
  --warm:#ff6b35;--str:#4ecdc4;--core:#a855f7;--stre:#22c55e;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.04);
  padding:14px 16px 0;
}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:14px;font-weight:800;letter-spacing:-0.3px}
.logo span{color:var(--accent)}
.dur{font-size:12px;color:var(--dim);font-weight:600}

.days{display:flex;gap:6px;padding-bottom:12px;overflow-x:auto;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day-btn{
  flex-shrink:0;padding:7px 16px;border:1.5px solid var(--border);border-radius:100px;
  background:transparent;color:var(--dim);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;
}
.day-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}

.content{padding:0 16px 100px}

.day-head{padding:24px 0 6px}
.day-head h2{font-size:24px;font-weight:900;letter-spacing:-0.7px;line-height:1.1}
.day-head p{font-size:13px;color:var(--mid);margin-top:4px;font-weight:500}

/* Phase divider */
.phase{
  display:flex;align-items:center;gap:10px;
  padding:20px 0 10px;
}
.phase-line{flex:1;height:1px;background:var(--border)}
.phase-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  padding:4px 10px;border-radius:100px;
}
.phase-warmup .phase-label{color:var(--warm);background:rgba(255,107,53,0.1)}
.phase-workout .phase-label{color:var(--str);background:rgba(78,205,196,0.1)}
.phase-stretch .phase-label{color:var(--stre);background:rgba(34,197,94,0.1)}

/* Exercise row */
.ex{
  display:flex;gap:14px;padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.03);
  align-items:center;
}
.ex:last-child{border-bottom:none}

.ex-thumb{
  width:60px;height:60px;border-radius:12px;background:var(--card);
  flex-shrink:0;overflow:hidden;cursor:pointer;border:1px solid var(--border);
}
.ex-thumb img{width:100%;height:100%;object-fit:cover}
.ex-thumb .ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--dim);text-align:center;padding:4px;line-height:1.2;
}

.ex-main{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;line-height:1.3}
.ex-reps{font-size:12px;color:var(--mid);margin-top:2px}

.ex-tag{
  display:inline-block;margin-top:3px;
  padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.3px;
}
.tag-superset{background:rgba(200,255,0,0.12);color:var(--accent)}
.tag-optional{background:rgba(255,255,255,0.05);color:var(--dim)}
.tag-rest{background:rgba(255,255,255,0.05);color:var(--dim)}

.note{font-size:11px;color:var(--dim);font-style:italic;padding:4px 0 8px}

/* Stretch */
.stretch{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);
}
.stretch:last-child{border-bottom:none}
.stretch-name{font-size:13px;font-weight:500;color:var(--text)}
.stretch-dur{font-size:12px;color:var(--dim);font-weight:500;flex-shrink:0;margin-left:12px}

/* Modal */
.modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);
  z-index:1000;align-items:center;justify-content:center;padding:24px;
}
.modal.show{display:flex}
.modal-inner{
  max-width:340px;width:100%;border-radius:20px;overflow:hidden;
  background:var(--card);border:1px solid var(--border);animation:pop 0.2s ease;
}
@keyframes pop{from{transform:scale(0.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-inner img{width:100%;display:block}
.modal-info{padding:14px 16px}
.modal-info h3{font-size:16px;font-weight:700}
.modal-info p{font-size:12px;color:var(--dim);margin-top:2px}
</style>
</head>
<body>

    <div class="logo">BURN<span>FROM</span>HOME</div>

const dayOrder=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const dayLabels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let active=dayOrder[new Date().getDay()===0?6:new Date().getDay()-1];

function renderTabs(){
  document.getElementById('tabs').innerHTML=dayOrder.map((d,i)=>
    `<button class="day-btn ${d===active?'active':''}" onclick="sel('${d}')">${dayLabels[i]}</button>`
  ).join('');
  document.getElementById('dur').textContent=DAYS[active].duration;
}

function sel(d){active=d;renderTabs();render();window.scrollTo({top:0,behavior:'smooth'})}

function render(){
  const day=DAYS[active];
  let h=`<div class="day-head"><h2>${day.title}</h2><p>${day.duration}</p></div>`;

  day.phases.forEach(p=>{
    // Phase divider
    h+=`<div class="phase phase-${p.type}"><div class="phase-line"></div><span class="phase-label">${p.label}</span><div class="phase-line"></div></div>`;

    if(p.note) h+=`<div class="note">${p.note}</div>`;

    if(p.stretches){
      p.stretches.forEach(s=>{
        h+=`<div class="stretch"><span class="stretch-name">${s.n}</span><span class="stretch-dur">${s.d}</span></div>`;
      });
    } else {
      p.items.forEach(e=>{
        const src=G[e.g]||'';
        h+=`<div class="ex">`;
        h+=`<div class="ex-thumb" ${src?`onclick="modal('${src.replace(/'/g,"\\'")}','${e.n.replace(/'/g,"\\'")}','${e.r.replace(/'/g,"\\'")}')"`:''}>`;
        if(src) h+=`<img src="${src}" alt="${e.n}" loading="lazy" onerror="this.outerHTML='<div class=ph>${e.n}</div>'">`;
        else h+=`<div class="ph">${e.n}</div>`;
        h+=`</div><div class="ex-main"><div class="ex-name">${e.n}</div><div class="ex-reps">${e.r}</div>`;
        if(e.tag) h+=`<span class="ex-tag tag-${e.tag}">${e.tag}</span>`;
        h+=`</div></div>`;
      });
    }
  });

  document.getElementById('content').innerHTML=h;
}

function modal(s,n,d){
  if(!s)return;
  document.getElementById('mI').src=s;
  document.getElementById('mT').textContent=n;
  document.getElementById('mD').textContent=d;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.getElementById('modal').addEventListener('click',closeModal);

renderTabs();render();
</script>
</body>
</html>
